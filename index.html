
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohel Math Care - Management System</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #27ae60;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1, h2 {
            text-align: center;
            color: var(--primary-color);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: #ddd;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button.submit-btn {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        /* Suggestion Box */
        .suggestions {
            border: 1px solid #ddd;
            max-height: 150px;
            overflow-y: auto;
            background: white;
            position: absolute;
            width: 95%;
            z-index: 100;
        }

        .suggestion-item {
            padding: 10px;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background: #f0f0f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: var(--primary-color);
            color: white;
        }

        /* Invoice Style */
        #invoice {
            display: none;
            padding: 20px;
            border: 2px solid #333;
            margin-top: 20px;
        }

        @media print {
            body * { visibility: hidden; }
            #invoice, #invoice * { visibility: visible; }
            #invoice { position: absolute; left: 0; top: 0; width: 100%; border: none; }
        }

        .summary-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--accent-color);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sohel Math Care</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showSection('add-student')">Add Student</button>
        <button class="tab-btn" onclick="showSection('payment')">Fees Payment</button>
        <button class="tab-btn" onclick="showSection('reports')">Reports</button>
    </div>

    <div id="add-student" class="section active">
        <h2>নতুন স্টুডেন্ট যুক্ত করুন</h2>
        <div class="form-group">
            <label>স্টুডেন্ট নাম:</label>
            <input type="text" id="s_name" placeholder="নাম লিখুন">
        </div>
        <div class="form-group">
            <label>পিতার নাম:</label>
            <input type="text" id="s_father" placeholder="পিতার নাম">
        </div>
        <div class="form-group">
            <label>মাতার নাম:</label>
            <input type="text" id="s_mother" placeholder="মাতার নাম">
        </div>
        <div class="form-group">
            <label>শ্রেণি:</label>
            <input type="text" id="s_class" placeholder="যেমন: ১০ম">
        </div>
        <div class="form-group">
            <label>স্কুলের নাম:</label>
            <input type="text" id="s_school" placeholder="স্কুলের নাম">
        </div>
        <button class="submit-btn" onclick="saveStudent()">সেভ করুন</button>
    </div>

    <div id="payment" class="section">
        <h2>বেতন গ্রহণ</h2>
        <div class="form-group" style="position: relative;">
            <label>স্টুডেন্ট আইডি বা নাম দিয়ে খুঁজুন:</label>
            <input type="text" id="search_student" onkeyup="searchStudent(this.value)" placeholder="টাইপ করুন...">
            <div id="suggestion_box" class="suggestions"></div>
        </div>
        <div id="student_details" style="display:none; margin-bottom: 20px; padding: 10px; background: #eef;">
            </div>
        <div class="form-group">
            <label>টাকার পরিমাণ:</label>
            <input type="number" id="pay_amount" placeholder="0.00">
        </div>
        <div class="form-group">
            <label>মাসের নাম:</label>
            <select id="pay_month">
                <option>জানুয়ারি</option>
                <option>ফেব্রুয়ারি</option>
                <option>মার্চ</option>
                <option>এপ্রিল</option>
                <option>মে</option>
                <option>জুন</option>
                <option>জুলাই</option>
                <option>আগস্ট</option>
                <option>সেপ্টেম্বর</option>
                <option>অক্টোবর</option>
                <option>নভেম্বর</option>
                <option>ডিসেম্বর</option>
            </select>
        </div>
        <button class="submit-btn" onclick="processPayment()">পেমেন্ট এবং প্রিন্ট ইনভয়েস</button>
    </div>

    <div id="reports" class="section">
        <h2>আয় ও রিপোর্ট</h2>
        <div class="summary-cards">
            <div class="card">
                <h3>আজকের আয়</h3>
                <h2 id="today_income">০ ৳</h2>
            </div>
            <div class="card" style="background: var(--secondary-color);">
                <h3>মোট আয় (এই মাস)</h3>
                <h2 id="month_income">০ ৳</h2>
            </div>
        </div>
        <input type="text" id="report_search" onkeyup="filterReport()" placeholder="যেকোনো তথ্য দিয়ে সার্চ করুন...">
        <table id="report_table">
            <thead>
                <tr>
                    <th>তারিখ</th>
                    <th>আইডি</th>
                    <th>নাম</th>
                    <th>মাস</th>
                    <th>টাকা</th>
                </tr>
            </thead>
            <tbody id="report_body"></tbody>
        </table>
    </div>

    <div id="invoice">
        <center>
            <h1>Sohel Math Care</h1>
            <p>ঠিকানা: আপনার সেন্টারের ঠিকানা এখানে লিখুন</p>
            <hr>
            <h3>পেমেন্ট রশিদ (Invoice)</h3>
        </center>
        <div id="invoice_content"></div>
        <br><br>
        <p style="text-align: right;">স্বাক্ষর: _________________</p>
    </div>

</div>

<script>
    // Initial Data
    let students = JSON.parse(localStorage.getItem('students')) || [];
    let payments = JSON.parse(localStorage.getItem('payments')) || [];
    let selectedStudent = null;

    // Navigation
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'reports') loadReports();
    }

    // Save Student
    function saveStudent() {
        const student = {
            id: 'SMC-' + (students.length + 101),
            name: document.getElementById('s_name').value,
            father: document.getElementById('s_father').value,
            mother: document.getElementById('s_mother').value,
            class: document.getElementById('s_class').value,
            school: document.getElementById('s_school').value
        };

        if(!student.name || !student.class) return alert("নাম এবং শ্রেণি অবশ্যই দিতে হবে!");

        students.push(student);
        localStorage.setItem('students', JSON.stringify(students));
        alert("স্টুডেন্ট সফলভাবে যুক্ত হয়েছে! আইডি: " + student.id);
        
        // Clear fields
        document.querySelectorAll('#add-student input').forEach(i => i.value = '');
    }

    // Search Student for Payment
    function searchStudent(val) {
        const box = document.getElementById('suggestion_box');
        box.innerHTML = '';
        if(!val) return;

        const filtered = students.filter(s => 
            s.name.toLowerCase().includes(val.toLowerCase()) || 
            s.id.toLowerCase().includes(val.toLowerCase())
        );

        filtered.forEach(s => {
            const div = document.createElement('div');
            div.className = 'suggestion-item';
            div.innerText = `${s.name} (${s.id}) - Class: ${s.class}`;
            div.onclick = () => selectStudent(s);
            box.appendChild(div);
        });
    }

    function selectStudent(student) {
        selectedStudent = student;
        document.getElementById('suggestion_box').innerHTML = '';
        document.getElementById('search_student').value = student.name;
        const details = document.getElementById('student_details');
        details.style.display = 'block';
        details.innerHTML = `<strong>ID:</strong> ${student.id} | <strong>Father:</strong> ${student.father} | <strong>Class:</strong> ${student.class}`;
    }

    // Payment Processing
    function processPayment() {
        const amount = document.getElementById('pay_amount').value;
        const month = document.getElementById('pay_month').value;
        const date = new Date().toLocaleDateString();

        if(!selectedStudent || !amount) return alert("সব তথ্য সঠিকভাবে দিন!");

        const payEntry = {
            date: date,
            timestamp: new Date().getTime(),
            studentId: selectedStudent.id,
            studentName: selectedStudent.name,
            amount: parseFloat(amount),
            month: month
        };

        payments.push(payEntry);
        localStorage.setItem('payments', JSON.stringify(payments));

        // Generate Invoice for Print
        const invoiceHtml = `
            <p><strong>তারিখ:</strong> ${date}</p>
            <p><strong>রশিদ নং:</strong> ${new Date().getTime()}</p>
            <p><strong>ছাত্র/ছাত্রীর নাম:</strong> ${selectedStudent.name}</p>
            <p><strong>আইডি:</strong> ${selectedStudent.id}</p>
            <p><strong>শ্রেণি:</strong> ${selectedStudent.class}</p>
            <p><strong>মাস:</strong> ${month}</p>
            <hr>
            <h3><strong>মোট টাকা:</strong> ${amount} ৳</h3>
        `;
        document.getElementById('invoice_content').innerHTML = invoiceHtml;
        
        window.print();

        // Reset
        selectedStudent = null;
        document.getElementById('student_details').style.display = 'none';
        document.getElementById('pay_amount').value = '';
        document.getElementById('search_student').value = '';
    }

    // Reports & Income Logic
    function loadReports() {
        const tbody = document.getElementById('report_body');
        tbody.innerHTML = '';
        let todaySum = 0;
        let monthSum = 0;
        const todayStr = new Date().toLocaleDateString();
        const currentMonth = new Date().getMonth();

        payments.sort((a, b) => b.timestamp - a.timestamp).forEach(p => {
            const row = `<tr>
                <td>${p.date}</td>
                <td>${p.studentId}</td>
                <td>${p.studentName}</td>
                <td>${p.month}</td>
                <td>${p.amount}</td>
            </tr>`;
            tbody.innerHTML += row;

            // Calculations
            if(p.date === todayStr) todaySum += p.amount;
            
            // Simplified month check
            const payDate = new Date(p.timestamp);
            if(payDate.getMonth() === currentMonth) monthSum += p.amount;
        });

        document.getElementById('today_income').innerText = todaySum + ' ৳';
        document.getElementById('month_income').innerText = monthSum + ' ৳';
    }

    // Search/Filter in Table
    function filterReport() {
        const val = document.getElementById('report_search').value.toLowerCase();
        const rows = document.querySelectorAll('#report_table tbody tr');
        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(val) ? '' : 'none';
        });
    }
</script>

</body>
</html>
